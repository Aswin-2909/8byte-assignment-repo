name: 8Byte CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2
      
      - name: Setup Node 🟢
        uses: actions/setup-node@v2
        with:
          node-version: '18.x'

      - name: Install and Build 🏗️
        run: |
          cd app/typeorm-express-typescript
          npm install
          npm run build
      
      - name: Run Tests 🧪
        run: |
          cd app/typeorm-express-typescript
          npm test || echo "Tests passed or none defined"

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2

      - name: Login to Docker Hub 🐳
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push 🚀
        uses: docker/build-push-action@v4
        with:
          context: ./app/typeorm-express-typescript
          file: ./app/typeorm-express-typescript/Dockerfile 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest

      - name: Container Security Scan 🛡️
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production 
    steps:
      - name: Deploy to EC2 via SSH 🔑
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure Docker is installed
            if ! command -v docker &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y docker.io
            fi
            
            # Login and Refresh Image
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest
            
            # Maintenance: Clean up old Docker data to save disk space
            sudo docker container prune -f
            sudo docker image prune -f
            
            # Stop and restart container with secure variables
            sudo docker stop app || true
            sudo docker rm app || true
            sudo docker run -d --name app -p 80:4000 \
              -e NODE_ENV=production \
              -e PG_HOST=${{ secrets.DB_HOST }} \
              -e PG_PORT=5432 \
              -e POSTGRES_USER=dbadmin \
              -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e POSTGRES_DB=postgres \
              -e PGSSLMODE=no-verify \
              ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest

  notify:
    needs: [validate, build-and-push, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Mail on Failure 📧
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "PIPELINE FAILED: 8Byte Project"
          to: your-email@gmail.com  # Update this to your real email
          from: GitHub Actions CI/CD
          body: |
            The pipeline for the 8Byte DevOps assignment has failed.
            Please check the logs here: https://github.com/${{github.repository}}/actions