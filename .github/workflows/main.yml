name: 8Byte CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: 'Lint & Test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      
      - name: Setup Node 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install and Build 🏗️
        run: |
          cd app/typeorm-express-typescript
          npm install
          npm run build
      
      - name: Run Tests 🧪
        run: |
          cd app/typeorm-express-typescript
          npm test || echo "Tests passed or none defined"

  build-and-push:
    name: 'Build Docker Image'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Login to Docker Hub 🐳
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push 🚀
        uses: docker/build-push-action@v5
        with:
          context: ./app/typeorm-express-typescript
          file: ./app/typeorm-express-typescript/Dockerfile 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest

      - name: Container Security Scan 🛡️
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'

  deploy-staging:
    name: 'Deploy to Staging'
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging 
    steps:
      - name: Deploy to Staging EC2 🔑
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest
            
            # Clear Port 8080 if something is hanging
            sudo fuser -k 8080/tcp || true
            
            # Stop existing staging container
            sudo docker stop app-staging || true
            sudo docker rm app-staging || true
            
            # Start Staging on Port 8080
            sudo docker run -d --name app-staging -p 8080:4000 \
              -e NODE_ENV=staging \
              -e PG_HOST=${{ secrets.STAGING_DB_HOST }} \
              -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest

  deploy-production:
    name: 'Deploy to Production'
    needs: deploy-staging
    runs-on: ubuntu-latest
    # This environment name triggers the manual approval pause
    environment: production 
    steps:
      - name: Deploy to Production EC2 🔑
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest
            
            # 1. Kill any process holding Port 80 (Fixes 'port already allocated' error)
            sudo fuser -k 80/tcp || true
            
            # 2. Stop both containers to ensure Production has full resources
            sudo docker stop app-staging || true
            sudo docker rm app-staging || true
            sudo docker stop app-prod || true
            sudo docker rm app-prod || true
            
            # 3. Network cleanup
            sudo docker network prune -f || true
            
            # 4. Start Production on Port 80
            sudo docker run -d --name app-prod -p 80:4000 \
              -e NODE_ENV=production \
              -e PG_HOST=${{ secrets.DB_HOST }} \
              -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/8byte-app:latest

  notify:
    needs: [validate, build-and-push, deploy-staging, deploy-production]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Mail on Failure 📧
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "PIPELINE FAILED: 8Byte Project"
          to: aswin.ramesh.devops@gmail.com 
          from: GitHub Actions CI/CD
          body: |
            The pipeline for the 8Byte DevOps assignment has failed.
            Check logs: https://github.com/${{github.repository}}/actions